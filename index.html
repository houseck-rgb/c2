<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>야채 발주 리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080604;--bg2:#0f0b06;--bg3:#181208;--bg4:#22180a;--bg5:#2e200e;
  --gold:#c8960a;--gold2:#e8b820;--gold3:#f5d060;--gold4:#a07808;--gold5:#6a5005;
  --glow:rgba(200,150,10,.13);--gb:rgba(200,150,10,.24);
  --ivory:#f8f0d8;--ivory2:#d8c898;--ivory3:#a08858;
  --green-c:#4ade80;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ivory);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:0 0 100px}

/* 헤더 */
.hdr{background:rgba(8,6,4,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--gb);padding:0 16px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:80}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-ico{font-size:22px;filter:drop-shadow(0 0 8px rgba(200,150,10,.5))}
.hdr-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;color:var(--gold2);letter-spacing:1px}
.hdr-date{font-size:10px;color:var(--ivory3)}

/* 히어로 */
.hero{padding:22px 18px 16px;background:linear-gradient(160deg,var(--bg3),var(--bg2) 60%,var(--bg));border-bottom:1px solid rgba(200,150,10,.1);text-align:center}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:5px;color:var(--gold4);text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:clamp(20px,5vw,26px);font-weight:900;letter-spacing:-0.5px}
.hero-title span{color:var(--green-c)}
.hero-date{font-size:12px;color:var(--ivory3);margin-top:4px}
.hero-cnt{display:inline-block;margin-top:10px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:20px;padding:3px 14px;font-size:11px;color:var(--green-c)}

/* 섹션 */
.wrap{max-width:520px;margin:0 auto;padding:18px 14px}
.slbl{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:4px;color:var(--gold4);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.slbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gb),transparent)}

/* 테이블 카드 */
.tcard{background:var(--bg3);border:1px solid rgba(200,150,10,.15);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.thead-row{display:grid;grid-template-columns:1fr 130px;border-bottom:1px solid rgba(200,150,10,.12);padding:8px 14px}
.thead-cell{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:3px;color:var(--gold4);text-transform:uppercase}
.thead-cell.c{text-align:center}

/* 행 */
.vrow{display:grid;grid-template-columns:1fr 130px;border-bottom:1px solid rgba(200,150,10,.07);align-items:center;transition:background .15s}
.vrow:last-child{border-bottom:none}
.vrow.filled{background:rgba(74,222,128,.04)}
.vrow-name{padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.vrow-emo{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.vrow-ctrl{padding:7px 10px;display:flex;align-items:center;justify-content:center;gap:4px}

/* 수량 버튼 */
.qbtn{width:28px;height:28px;border-radius:7px;border:1px solid rgba(200,150,10,.2);background:var(--bg2);color:var(--ivory3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-user-select:none;user-select:none}
.qbtn:active{background:rgba(200,150,10,.15);color:var(--gold2)}
.qin{width:58px;height:32px;background:var(--bg2);border:1px solid rgba(200,150,10,.18);border-radius:7px;color:var(--ivory3);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;text-align:center;outline:none;transition:border-color .2s,color .2s}
.qin.has{border-color:rgba(74,222,128,.45);color:var(--green-c)}
.qin:focus{border-color:var(--gold)}

/* 미리보기 */
.prev-box{background:var(--bg2);border:1px solid rgba(200,150,10,.15);border-radius:var(--r);padding:14px;margin-bottom:20px;min-height:72px}
.prev-empty{font-size:13px;color:var(--ivory3);text-align:center;padding:10px 0}
.prev-txt{font-size:13px;color:var(--ivory2);white-space:pre-wrap;word-break:break-all;line-height:1.8}

/* 버튼 */
.share-btn{width:100%;height:52px;background:linear-gradient(135deg,#3A1D00,#5A3200);border:1px solid rgba(200,150,10,.4);border-radius:var(--r);color:var(--gold2);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all .2s}
.share-btn:active{transform:scale(.98);opacity:.9}
.copy-btn{width:100%;height:42px;background:var(--bg3);border:1px solid rgba(200,150,10,.2);border-radius:var(--r);color:var(--ivory3);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:10px;transition:all .2s}
.copy-btn:active{background:rgba(200,150,10,.1);color:var(--gold2)}
.reset-btn{width:100%;height:38px;background:transparent;border:1px dashed rgba(200,150,10,.18);border-radius:var(--r);color:var(--ivory3);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.reset-btn:active{color:var(--gold)}

/* 토스트 */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:#fff;color:#111;font-size:13px;font-weight:500;padding:10px 22px;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.45);transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <span class="hdr-ico">🥬</span>
    <div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:8px;letter-spacing:4px;color:var(--gold4);text-transform:uppercase">최우영고기야</div>
      <div class="hdr-title">야채 발주</div>
    </div>
  </div>
  <div class="hdr-date" id="hdrDate"></div>
</div>

<div class="hero">
  <div class="hero-sub">Vegetable Order List</div>
  <div class="hero-title">오늘의 <span>야채 발주</span></div>
  <div class="hero-date" id="heroDate"></div>
  <div class="hero-date" id="heroTime" style="color:var(--green-c);font-weight:700">⏰ 발주시간 --:--</div>
  <div class="hero-cnt" id="heroCnt">0개 입력</div>
</div>

<div class="wrap">
  <div class="slbl">🥬 야채 리스트</div>

  <div class="tcard">
    <div class="thead-row">
      <div class="thead-cell">품목</div>
      <div class="thead-cell c">수량</div>
    </div>
    <div id="vegBody"></div>
  </div>

  <div class="slbl">📝 메모</div>
  <textarea id="memo" placeholder="특이사항, 요청사항..." style="width:100%;min-height:64px;background:var(--bg3);border:1px solid rgba(200,150,10,.15);border-radius:var(--r);color:var(--ivory);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:12px 14px;outline:none;resize:none;margin-bottom:20px;transition:border-color .2s"></textarea>

  <div class="slbl">📋 미리보기</div>
  <div class="prev-box">
    <div id="prev" class="prev-empty">수량을 입력하면 여기에 메시지가 표시됩니다.</div>
  </div>

  <button class="share-btn" onclick="doShare()">📲 카카오톡 보내기</button>
  <button class="copy-btn" onclick="doCopy()">📋 텍스트 복사</button>
  <button class="reset-btn" onclick="doReset()">↺ 전체 초기화</button>
</div>

<div class="toast" id="toast"></div>

<script>
const ITEMS = [
  {name:'무우',    emoji:'⬜'},
  {name:'양파',    emoji:'🧅'},
  {name:'대파',    emoji:'🌿'},
  {name:'청양고추',emoji:'🌶️'},
  {name:'오이고추',emoji:'🥒'},
  {name:'알배추',  emoji:'🥬'},
  {name:'배',      emoji:'🍐'},
  {name:'상추',    emoji:'🥗'},
  {name:'깻잎',    emoji:'🌿'},
  {name:'계란',    emoji:'🥚'},
  {name:'두부',    emoji:'⬜'},
  {name:'적근대',  emoji:'🌱'},
  {name:'깐마늘',  emoji:'🧄'},
  {name:'애호박',  emoji:'🥒'},
  {name:'알마늘',  emoji:'🧄'},
  {name:'산고추',  emoji:'🌶️'},
  {name:'버터',    emoji:'🧈'},
  {name:'사과주스',emoji:'🧃'},
  {name:'참숯',    emoji:'🪨'},
  {name:'고춧가루',    emoji:'🌶️'},
  {name:'메밀 김가루', emoji:'🌾'},
];

let data = ITEMS.map(v => ({...v, qty: 0}));

// 날짜
function setDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];

  const hour = String(d.getHours()).padStart(2,'0');
  const minute = String(d.getMinutes()).padStart(2,'0');
  const time = `${hour}:${minute}`;

  const str = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  const short = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;

  document.getElementById('hdrDate').textContent = short;
  document.getElementById('heroDate').textContent = str;

  const heroTime = document.getElementById('heroTime');
  if (heroTime) {
    heroTime.textContent = `⏰ 발주시간: ${time}`;
  }
}
setDate();
setInterval(setDate, 30000);

// 렌더
function render() {
  const body = document.getElementById('vegBody');
  body.innerHTML = '';
  data.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'vrow' + (item.qty > 0 ? ' filled' : '');

    // 품목명
    const nm = document.createElement('div');
    nm.className = 'vrow-name';
    nm.innerHTML = `<span class="vrow-emo">${item.emoji}</span>${item.name}`;

    // 수량 컨트롤
    const ctrl = document.createElement('div');
    ctrl.className = 'vrow-ctrl';

    const bm = document.createElement('button');
    bm.className = 'qbtn'; bm.textContent = '−';
    bm.onclick = () => { data[i].qty = Math.max(0, data[i].qty - 1); render(); };

    const inp = document.createElement('input');
    inp.type = 'number'; inp.min = '0';
    inp.className = 'qin' + (item.qty > 0 ? ' has' : '');
    inp.placeholder = '0';
    inp.value = item.qty > 0 ? item.qty : '';
    inp.addEventListener('input', () => {
      const n = parseFloat(inp.value);
      data[i].qty = (isNaN(n) || n < 0) ? 0 : n;
      inp.className = 'qin' + (data[i].qty > 0 ? ' has' : '');
      updateCnt(); buildPreview();
    });

    const bp = document.createElement('button');
    bp.className = 'qbtn'; bp.textContent = '+';
    bp.onclick = () => { data[i].qty += 1; render(); };

    ctrl.append(bm, inp, bp);
    row.append(nm, ctrl);
    body.appendChild(row);
  });
  updateCnt(); buildPreview();
}

function updateCnt() {
  const cnt = data.filter(i => i.qty > 0).length;
  document.getElementById('heroCnt').textContent = `${cnt}개 입력`;
}

// 메시지 빌드
function buildMsg() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];

  const hour = String(d.getHours()).padStart(2,'0');
  const minute = String(d.getMinutes()).padStart(2,'0');
  const time = `${hour}:${minute}`;

  const filled = data.filter(i => i.qty > 0);

  if (!filled.length) return null;

  let msg =
`🏪 최우영고기야 발주 리스트
📅 ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})
⏰ 발주시간: ${time}
━━━━━━━━━━━━━━

🥬 야채
`;

  filled.forEach(i => {
    msg += `  ${i.emoji} ${i.name}: ${i.qty}\n`;
  });

  const memo = document.getElementById('memo').value.trim();

  if (memo) {
    msg += `\n📝 메모\n${memo}\n`;
  }

  return msg + '━━━━━━━━━━━━━━';
}

function buildPreview() {
  const el = document.getElementById('prev');
  const msg = buildMsg();
  if (!msg) {
    el.className = 'prev-empty';
    el.textContent = '수량을 입력하면 여기에 메시지가 표시됩니다.';
  } else {
    el.className = 'prev-txt';
    el.textContent = msg;
  }
}
document.getElementById('memo').addEventListener('input', buildPreview);

// 공유
async function doShare() {
  const msg = buildMsg();

  if (!msg) {
    showToast('⚠️ 수량을 먼저 입력해주세요');
    return;
  }

  // 1. 파일 공유 시도
  try {
    const blob = new Blob([msg], {type:'text/plain'});
    const file = new File([blob], '야채발주.txt', {type:'text/plain'});

    if (
      navigator.canShare &&
      navigator.canShare({files:[file]})
    ) {
      await navigator.share({
        files:[file],
        title:'야채 발주 리스트'
      });

      return;
    }
  } catch(e){}

  // 2. 텍스트 공유 시도
  try {
    if (navigator.share) {
      await navigator.share({
        title:'야채 발주 리스트',
        text:msg
      });

      return;
    }
  } catch(e){}

  // 3. 실패 시 복사
  await copyText(msg);

  showToast('📋 복사 완료! 카카오톡에 붙여넣어 주세요');
}

async function doCopy() {
  const msg = buildMsg();
  if (!msg) { showToast('⚠️ 수량을 먼저 입력해주세요'); return; }
  await copyText(msg);
  showToast('📋 복사 완료!');
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return; } catch(e){}
  const el = document.createElement('textarea');
  el.value = text; document.body.appendChild(el); el.select();
  document.execCommand('copy'); document.body.removeChild(el);
}

function doReset() {
  if (!confirm('전체 수량을 초기화할까요?')) return;
  data = ITEMS.map(v => ({...v, qty:0}));
  document.getElementById('memo').value = '';
  render();
  showToast('↺ 초기화 완료');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

render();
</script>
</body>
</html>
